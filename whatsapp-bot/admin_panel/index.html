<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Terminal</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                        syne: ['Syne', 'sans-serif']
                    },
                    colors: {
                        brand: {
                            cyan: '#00d4ff',
                            cyanHover: '#00b8e6',
                            bg: '#080c14',
                            surface: '#0d1117',
                            border: '#1a2332',
                            hover: '#111827',
                            textMuted: '#4a5568',
                            textMutedLight: '#a0aec0'
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
    <style>
        body { background-color: #080c14; color: white; }

        @keyframes spin360 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes wobble { 0%, 100% { transform: scale(1) skewX(0deg); } 50% { transform: scale(1.08) skewX(3deg); } }
        @keyframes orbit1 { 0% { transform: rotate(0deg) translateX(100px) rotate(0deg); } 100% { transform: rotate(360deg) translateX(100px) rotate(-360deg); } }
        @keyframes orbit2 { 0% { transform: rotate(120deg) translateX(120px) rotate(-120deg); } 100% { transform: rotate(480deg) translateX(120px) rotate(-480deg); } }
        @keyframes orbit3 { 0% { transform: rotate(240deg) translateX(110px) rotate(-240deg); } 100% { transform: rotate(600deg) translateX(110px) rotate(-600deg); } }

        .star-shape {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
        .orbit-star {
            position: absolute;
            width: 32px;
            height: 32px;
        }
        .no-rounded * { border-radius: 0 !important; }
        .logo-mark {
            position: relative; width: 24px; height: 24px;
        }
        .logo-mark::before, .logo-mark::after {
            content: ""; position: absolute; border: 2px solid #00d4ff; width: 16px; height: 16px;
        }
        .logo-mark::before { top: 0; left: 0; }
        .logo-mark::after { bottom: 0; right: 0; }
        
        .input-dark {
            background-color: #080c14;
            border: 1px solid #1a2332;
            color: white;
            padding: 10px 14px;
        }
        .input-dark:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .btn-primary {
            background-color: #00d4ff;
            color: #080c14;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 24px;
            transition: background-color 0.2s;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #00b8e6;
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Table specific styles */
        table { border-collapse: collapse; }
        th { letter-spacing: 2px; }
        tr { border-bottom: 1px solid #1a2332; }
        tr:last-child { border-bottom: none; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #080c14; }
        ::-webkit-scrollbar-thumb { background: #1a2332; }
        ::-webkit-scrollbar-thumb:hover { background: #4a5568; }
    </style>
</head>
<body class="antialiased no-rounded selection:bg-[#00d4ff] selection:text-[#080c14]">
    <div id="root" class="h-screen w-screen overflow-hidden flex"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const API_URL = "http://localhost:8000/admin";

        // --- SVG Icons ---
        const Icons = {
            Search: () => <svg className="w-4 h-4 text-brand-textMutedLight" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Edit: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>,
            Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Logout: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>,
            X: () => <svg className="w-5 h-5 text-brand-textMutedLight hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
        };

        // --- Toast System ---
        const ToastContext = React.createContext();
        
        function ToastProvider({ children }) {
            const [toasts, setToasts] = useState([]);
            
            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
            };

            return (
                <ToastContext.Provider value={addToast}>
                    {children}
                    <div className="fixed bottom-6 right-6 z-50 flex flex-col gap-3">
                        {toasts.map(t => (
                            <div key={t.id} className={`flex items-center px-4 py-3 bg-brand-surface border border-brand-border ${t.type === 'success' ? 'border-l-brand-cyan' : 'border-l-red-500'}`} style={{ borderLeftWidth: '3px' }}>
                                <p className="text-sm font-medium text-white tracking-wide">{t.message}</p>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        }
        const useToast = () => React.useContext(ToastContext);

        // --- API Client ---
        const useApi = (auth) => {
            const config = { headers: { 'Authorization': `Basic ${auth?.token}` } };
            return {
                get: (path) => axios.get(`${API_URL}${path}`, config).then(res => res.data),
                post: (path, data) => axios.post(`${API_URL}${path}`, data, config).then(res => res.data),
                put: (path, data) => axios.put(`${API_URL}${path}`, data, config).then(res => res.data),
                del: (path) => axios.delete(`${API_URL}${path}`, config).then(res => res.data)
            };
        };

        // --- Shared Components ---
        const Spinner = () => (
            <svg className="animate-spin h-5 w-5 text-brand-cyan mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        );

        // --- Login ---
        function Login({ setAuth }) {
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");
            const [showPassword, setShowPassword] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true); setError("");
                const token = btoa(`${username}:${password}`);
                try {
                    await axios.get(`${API_URL}/dashboard`, { headers: { 'Authorization': `Basic ${token}` } });
                    setAuth({ username, password, token });
                } catch (err) {
                    setError("ACCESS DENIED: Invalid credentials.");
                } finally {
                    setLoading(false);
                }
            };

            const EyeIcon = ({ open }) => open ? (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            ) : (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L6.59 6.59m7.532 7.532l3.29 3.29M3 3l18 18" />
                </svg>
            );

            return (
                <div className="min-h-screen w-full flex items-center justify-center bg-brand-bg">
                    <div className="w-[440px] bg-brand-surface border border-brand-border" style={{ padding: '48px' }}>
                        <div className="flex flex-col items-center mb-10">
                            <div className="logo-mark mb-6"></div>
                            <h1 className="font-syne text-[28px] font-bold tracking-wider text-white uppercase text-center">System Login</h1>
                        </div>
                        {error && (
                            <div className="mb-6 px-4 py-3 bg-red-500/10 text-red-500 border border-red-500/20 text-sm font-semibold tracking-wide text-center uppercase">
                                {error}
                            </div>
                        )}
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div>
                                <label className="block text-brand-textMuted text-xs uppercase tracking-[2px] font-bold mb-2">Operator ID</label>
                                <input type="text" value={username} onChange={e => setUsername(e.target.value)} required className="w-full input-dark" />
                            </div>
                            <div>
                                <label className="block text-brand-textMuted text-xs uppercase tracking-[2px] font-bold mb-2">Passcode</label>
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} value={password} onChange={e => setPassword(e.target.value)} required className="w-full input-dark pr-10" />
                                    <button type="button" onClick={() => setShowPassword(p => !p)}
                                        className="absolute inset-y-0 right-0 pr-3 flex items-center text-brand-textMutedLight hover:text-brand-cyan transition-colors">
                                        <EyeIcon open={showPassword} />
                                    </button>
                                </div>
                            </div>
                            <div className="pt-2">
                                <button type="submit" disabled={loading} className="w-full btn-primary">
                                    {loading ? <Spinner /> : "Authenticate"}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // --- Dashboard ---
        function Dashboard({ auth }) {
            const api = useApi(auth);
            const [stats, setStats] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                api.get('/dashboard').then(data => { setStats(data); setLoading(false); }).catch(console.error);
            }, []);

            if (loading) return <div className="h-64 flex items-center justify-center"><Spinner /></div>;

            const cards = [
                { label: "Products", value: stats.products, grad: "linear-gradient(135deg, #00d4ff, #0080ff)", glow: "rgba(0, 212, 255, 0.5)", spin: "8s" },
                { label: "Categories", value: stats.categories, grad: "linear-gradient(135deg, #f59e0b, #ef4444)", glow: "rgba(245, 158, 11, 0.5)", spin: "12s" },
                { label: "Quotations", value: stats.quotations, grad: "linear-gradient(135deg, #10b981, #00d4ff)", glow: "rgba(16, 185, 129, 0.5)", spin: "10s" },
                { label: "Conversations", value: stats.user_sessions, grad: "linear-gradient(135deg, #8b5cf6, #ec4899)", glow: "rgba(139, 92, 246, 0.5)", spin: "14s" }
            ];

            return (
                <div className="space-y-16">
                    <div className="flex flex-row justify-between items-center px-4 pt-10">
                        {cards.map((c, i) => (
                            <div key={c.label} className="relative flex justify-center items-center w-[160px] h-[160px]">
                                <div className="absolute inset-0" style={{ filter: `drop-shadow(0 0 20px ${c.glow})` }}>
                                    <div className="absolute inset-0 flex justify-center items-center" style={{ animation: `spin360 ${c.spin} linear infinite` }}>
                                        <div className="star-shape w-full h-full" style={{ background: c.grad, animation: `wobble 2s ease-in-out infinite` }}></div>
                                        <div className="star-shape orbit-star" style={{ background: c.grad, animation: `orbit1 3s linear infinite` }}></div>
                                        <div className="star-shape orbit-star" style={{ background: c.grad, animation: `orbit2 5s linear infinite` }}></div>
                                        <div className="star-shape orbit-star" style={{ background: c.grad, animation: `orbit3 4s linear infinite` }}></div>
                                    </div>
                                </div>
                                
                                <div className="relative z-10 flex flex-col items-center justify-center pointer-events-none mt-2">
                                    <span className="font-syne text-3xl font-bold text-white drop-shadow-md">{c.value}</span>
                                    <span className="text-[10px] uppercase font-bold tracking-[1px] text-white mt-1 drop-shadow-md">{c.label}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <div>
                        <h2 className="font-syne text-xl text-white mb-4 border-b border-brand-border pb-2">INVENTORY OVERVIEW</h2>
                        <ProductsTable auth={auth} compact={true} />
                    </div>
                </div>
            );
        }

        // --- Products Table & Management ---
        function ProductsTable({ auth, compact = false }) {
            const api = useApi(auth);
            const showToast = useToast();
            const [products, setProducts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [search, setSearch] = useState("");
            const [loading, setLoading] = useState(true);

            // Modal State
            const [modalOpen, setModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [form, setForm] = useState({ name: "", sku: "", price: "", category_id: "", stock_quantity: "", in_stock: true, unit: "pcs" });
            const [saving, setSaving] = useState(false);

            const loadData = async () => {
                setLoading(true);
                try {
                    const [p, c] = await Promise.all([api.get('/products'), api.get('/categories')]);
                    setProducts(p); setCategories(c);
                } catch(e) { showToast("SYSTEM ERROR: Failed to fetch inventory data.", "error"); }
                setLoading(false);
            };

            useEffect(() => { loadData(); }, []);

            const filteredProducts = useMemo(() => {
                if (!search) return products;
                const lower = search.toLowerCase();
                return products.filter(p => p.name.toLowerCase().includes(lower) || p.sku.toLowerCase().includes(lower));
            }, [products, search]);

            const handleSave = async (e) => {
                e.preventDefault();
                setSaving(true);
                const payload = {
                    name: form.name,
                    sku: form.sku,
                    price: parseFloat(form.price),
                    category_id: parseInt(form.category_id),
                    stock_quantity: form.in_stock ? parseInt(form.stock_quantity || 1) : 0
                };

                try {
                    if (editingId) await api.put(`/products/${editingId}`, payload);
                    else await api.post('/products', payload);
                    
                    showToast(`PRODUCT ${editingId ? 'UPDATED' : 'CREATED'} SUCCESSFULLY.`);
                    setModalOpen(false);
                    loadData();
                } catch(err) {
                    showToast(err.response?.data?.detail || "ERROR: Operation failed.", "error");
                } finally {
                    setSaving(false);
                }
            };

            const openEdit = (p) => {
                setForm({ name: p.name, sku: p.sku, price: p.price, category_id: p.category_id, stock_quantity: p.stock_quantity, in_stock: p.stock_quantity > 0, unit: "pcs" });
                setEditingId(p.id);
                setModalOpen(true);
            };

            const handleDelete = async (id) => {
                if (!window.confirm("CONFIRMATION REQUIRED: Purge this record from the database?")) return;
                try {
                    await api.del(`/products/${id}`);
                    showToast("RECORD PURGED.");
                    loadData();
                } catch(err) {
                    showToast("ERROR: Deletion failed.", "error");
                }
            };

            const getCatName = (id) => categories.find(c => c.id === id)?.name || "UNKNOWN";

            return (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div className="relative w-full max-w-md">
                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <Icons.Search />
                            </div>
                            <input type="text" placeholder="QUERY BY NAME OR SKU..." value={search} onChange={e => setSearch(e.target.value)}
                                className="w-full pl-10 bg-[#111827] border border-brand-border text-white px-4 py-2 text-sm focus:outline-none focus:border-brand-cyan transition-colors uppercase tracking-wide placeholder-brand-textMutedLight" />
                        </div>
                        {!compact && (
                            <button onClick={() => { setEditingId(null); setForm({ name: "", sku: "", price: "", category_id: "", stock_quantity: "0", in_stock: true, unit: "pcs" }); setModalOpen(true); }}
                                className="btn-primary py-2 px-6">
                                ADD PRODUCT
                            </button>
                        )}
                    </div>

                    <div className="bg-brand-surface border border-brand-border w-full overflow-x-auto">
                        <table className="w-full text-left whitespace-nowrap">
                            <thead>
                                <tr className="border-b border-brand-border bg-[#111827]">
                                    <th className="px-6 py-4 text-[#4a5568] uppercase text-[11px] font-bold tracking-[2px]">Identifier</th>
                                    <th className="px-6 py-4 text-[#4a5568] uppercase text-[11px] font-bold tracking-[2px]">Category</th>
                                    <th className="px-6 py-4 text-[#4a5568] uppercase text-[11px] font-bold tracking-[2px]">Value</th>
                                    <th className="px-6 py-4 text-[#4a5568] uppercase text-[11px] font-bold tracking-[2px]">Volume</th>
                                    <th className="px-6 py-4 text-[#4a5568] uppercase text-[11px] font-bold tracking-[2px]">State</th>
                                    {!compact && <th className="px-6 py-4 text-[#4a5568] uppercase text-[11px] font-bold tracking-[2px] text-right">Ops</th>}
                                </tr>
                            </thead>
                            <tbody>
                                {loading ? (
                                    <tr><td colSpan={compact ? 5 : 6} className="px-6 py-12"><Spinner /></td></tr>
                                ) : filteredProducts.length === 0 ? (
                                    <tr><td colSpan={compact ? 5 : 6} className="px-6 py-12 text-center text-brand-textMutedLight font-syne tracking-widest uppercase text-sm">No records found</td></tr>
                                ) : filteredProducts.map(p => (
                                    <tr key={p.id} className="hover:bg-brand-hover transition-colors">
                                        <td className="px-6 py-4">
                                            <div className="font-bold text-white mb-1">{p.name}</div>
                                            <div className="text-xs text-brand-textMutedLight font-mono">{p.sku}</div>
                                        </td>
                                        <td className="px-6 py-4 text-sm text-brand-textMutedLight">{getCatName(p.category_id)}</td>
                                        <td className="px-6 py-4 text-sm font-bold text-white">${parseFloat(p.price).toFixed(2)}</td>
                                        <td className="px-6 py-4 text-sm text-brand-textMutedLight">{p.stock_quantity} units</td>
                                        <td className="px-6 py-4">
                                            {p.stock_quantity > 0 
                                                ? <span className="inline-block px-3 py-1 text-[11px] font-bold uppercase tracking-wider text-brand-cyan bg-[rgba(0,212,255,0.1)] border border-[rgba(0,212,255,0.2)]">In Stock</span>
                                                : <span className="inline-block px-3 py-1 text-[11px] font-bold uppercase tracking-wider text-[#ef4444] bg-[rgba(239,68,68,0.1)] border border-[rgba(239,68,68,0.2)]">Out of Stock</span>
                                            }
                                        </td>
                                        {!compact && (
                                            <td className="px-6 py-4 text-right">
                                                <button onClick={() => openEdit(p)} className="text-brand-cyan hover:text-white mx-3 transition-colors"><Icons.Edit /></button>
                                                <button onClick={() => handleDelete(p.id)} className="text-[#ef4444] hover:text-white ml-2 transition-colors"><Icons.Trash /></button>
                                            </td>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {modalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-[rgba(0,0,0,0.7)] p-4">
                            <div className="bg-brand-surface border border-brand-border w-full" style={{ width: '480px' }}>
                                <div className="flex justify-between items-center p-6 border-b border-brand-border bg-[#111827]">
                                    <h3 className="font-syne text-lg font-bold text-white uppercase tracking-wider">{editingId ? 'Edit Record' : 'Initialize Record'}</h3>
                                    <button onClick={() => setModalOpen(false)}><Icons.X /></button>
                                </div>
                                <form onSubmit={handleSave} className="p-6">
                                    <div className="space-y-5">
                                        <div>
                                            <label className="block text-[#4a5568] text-[11px] font-bold uppercase tracking-[2px] mb-2">Nomenclature</label>
                                            <input required type="text" value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className="w-full input-dark" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-5">
                                            <div>
                                                <label className="block text-[#4a5568] text-[11px] font-bold uppercase tracking-[2px] mb-2">Designator (SKU)</label>
                                                <input required type="text" value={form.sku} onChange={e=>setForm({...form, sku: e.target.value})} disabled={!!editingId} className="w-full input-dark disabled:opacity-50" />
                                            </div>
                                            <div>
                                                <label className="block text-[#4a5568] text-[11px] font-bold uppercase tracking-[2px] mb-2">Classification</label>
                                                <select required value={form.category_id} onChange={e=>setForm({...form, category_id: e.target.value})} className="w-full input-dark">
                                                    <option value="">SELECT...</option>
                                                    {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-5">
                                            <div>
                                                <label className="block text-[#4a5568] text-[11px] font-bold uppercase tracking-[2px] mb-2">Valuation ($)</label>
                                                <input required type="number" step="0.01" value={form.price} onChange={e=>setForm({...form, price: e.target.value})} className="w-full input-dark" />
                                            </div>
                                            <div>
                                                <label className="block text-[#4a5568] text-[11px] font-bold uppercase tracking-[2px] mb-2">Unit Type</label>
                                                <input type="text" value={form.unit} onChange={e=>setForm({...form, unit: e.target.value})} className="w-full input-dark" placeholder="PCS" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-5 items-end">
                                            <div>
                                                <label className="block text-[#4a5568] text-[11px] font-bold uppercase tracking-[2px] mb-2">Volume</label>
                                                <input required type="number" min="0" value={form.stock_quantity} onChange={e=>setForm({...form, stock_quantity: e.target.value})} className="w-full input-dark" />
                                            </div>
                                            <div className="pb-3 flex items-center">
                                                <input type="checkbox" id="in_stock" checked={form.in_stock} onChange={e=>setForm({...form, in_stock: e.target.checked})} className="h-4 w-4 bg-brand-bg border-brand-border checked:bg-brand-cyan focus:ring-0" />
                                                <label htmlFor="in_stock" className="ml-3 text-sm font-bold text-white uppercase tracking-wider cursor-pointer">Active Supply</label>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-8 pt-6 border-t border-brand-border flex justify-end gap-4">
                                        <button type="button" onClick={() => setModalOpen(false)} className="px-6 py-2 text-sm font-bold text-brand-textMutedLight hover:text-white uppercase tracking-wider transition-colors">Abort</button>
                                        <button type="submit" disabled={saving} className="btn-primary">
                                            {saving ? <Spinner /> : "Execute"}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function CategoriesPage({ auth }) {
            const api = useApi(auth);
            const showToast = useToast();
            const [categories, setCategories] = useState([]);
            const [loading, setLoading] = useState(true);
            const [name, setName] = useState("");
            const [adding, setAdding] = useState(false);

            const loadData = async () => {
                setLoading(true);
                try {
                    const data = await api.get('/categories');
                    setCategories(data);
                } catch(e) { showToast("ERROR: Data stream interrupted.", "error"); }
                setLoading(false);
            };

            useEffect(() => { loadData(); }, []);

            const handleAdd = async (e) => {
                e.preventDefault();
                setAdding(true);
                try {
                    await api.post('/categories', { name });
                    showToast("CLASSIFICATION CREATED.");
                    setName("");
                    loadData();
                } catch(e) { showToast("ERROR: Write operation failed.", "error"); }
                setAdding(false);
            };

            const handleDelete = async (id) => {
                showToast("ERROR: Deletion endpoint disabled/missing at core.", "error");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-2 bg-brand-surface border border-brand-border">
                        <table className="w-full text-left whitespace-nowrap">
                            <thead className="bg-[#111827]">
                                <tr className="border-b border-brand-border">
                                    <th className="px-6 py-4 text-[#4a5568] uppercase text-[11px] font-bold tracking-[2px]">Classification</th>
                                    <th className="px-6 py-4 text-[#4a5568] uppercase text-[11px] font-bold tracking-[2px] text-right">Ops</th>
                                </tr>
                            </thead>
                            <tbody>
                                {loading ? <tr><td colSpan="2" className="py-12"><Spinner /></td></tr> :
                                 categories.length === 0 ? <tr><td colSpan="2" className="py-12 text-center text-brand-textMutedLight font-syne uppercase text-sm tracking-widest">No classifications exist</td></tr> :
                                 categories.map(c => (
                                    <tr key={c.id} className="hover:bg-brand-hover transition-colors">
                                        <td className="px-6 py-4 text-sm font-bold text-white">{c.name}</td>
                                        <td className="px-6 py-4 text-right">
                                            <button onClick={() => handleDelete(c.id)} className="text-[#ef4444] hover:text-white transition-colors"><Icons.Trash /></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    <div className="bg-brand-surface border border-brand-border p-6 h-fit">
                        <h4 className="font-syne text-lg font-bold text-white uppercase tracking-wider mb-6 border-b border-brand-border pb-2">New Class</h4>
                        <form onSubmit={handleAdd} className="space-y-6">
                            <div>
                                <label className="block text-[#4a5568] text-[11px] font-bold uppercase tracking-[2px] mb-2">Class Name</label>
                                <input required type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full input-dark" />
                            </div>
                            <button type="submit" disabled={adding} className="w-full btn-primary">
                                {adding ? <Spinner /> : "Inject"}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // --- App Layout ---
        function AdminApp({ auth, setAuth }) {
            const [activeTab, setActiveTab] = useState("Dashboard");

            const navItems = [
                { id: "Dashboard", title: "Global View" },
                { id: "Products", title: "Inventory" },
                { id: "Categories", title: "Taxonomy" }
            ];

            return (
                <div className="flex w-full h-full">
                    {/* Sidebar */}
                    <div className="bg-brand-surface border-r border-brand-border flex flex-col" style={{ width: '260px' }}>
                        <div className="h-[88px] flex items-center px-8 border-b border-brand-border">
                            <div className="flex items-center gap-4">
                                <div className="logo-mark"></div>
                                <span className="font-syne text-[15px] font-bold text-white uppercase tracking-[4px] leading-tight mt-1">ACME<br/>SYS</span>
                            </div>
                        </div>
                        <div className="flex-1 py-8 flex flex-col gap-1">
                            {navItems.map(item => {
                                const active = activeTab === item.id;
                                return (
                                    <button key={item.id} onClick={() => setActiveTab(item.id)}
                                        className={`w-full text-left px-8 py-4 font-bold text-[13px] tracking-[1px] uppercase transition-all duration-200 border-l-[3px]
                                            ${active 
                                                ? 'border-brand-cyan bg-[rgba(0,212,255,0.08)] text-white' 
                                                : 'border-transparent text-brand-textMutedLight hover:text-white hover:bg-brand-hover'
                                            }`}>
                                        {item.title}
                                    </button>
                                );
                            })}
                        </div>
                        <div className="p-6 border-t border-brand-border bg-[#111827]">
                            <div className="mb-4">
                                <p className="text-[#4a5568] text-[10px] font-bold uppercase tracking-[2px]">Active Operator</p>
                                <p className="text-white text-sm font-bold tracking-wide mt-1">{auth.username}</p>
                            </div>
                            <button onClick={() => setAuth(null)} className="flex items-center gap-3 text-brand-cyan hover:text-white transition-colors text-[11px] font-bold uppercase tracking-[2px]">
                                <Icons.Logout /> Terminate Session
                            </button>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 flex flex-col relative overflow-hidden bg-brand-bg">
                        <header className="px-10 py-8 border-b border-brand-border bg-brand-bg z-10 flex flex-col justify-center">
                            <h1 className="font-syne text-[28px] font-bold text-white uppercase tracking-wider">{activeTab}</h1>
                            <p className="text-[#4a5568] text-xs font-bold uppercase tracking-[2px] mt-2">Core System Operations Center</p>
                        </header>
                        <main className="flex-1 overflow-y-auto p-10 relative">
                            {activeTab === "Dashboard" && <Dashboard auth={auth} />}
                            {activeTab === "Products" && <ProductsTable auth={auth} />}
                            {activeTab === "Categories" && <CategoriesPage auth={auth} />}
                        </main>
                    </div>
                </div>
            );
        }

        function App() {
            const [auth, setAuth] = useState(null);
            
            return (
                <ToastProvider>
                    {!auth ? <Login setAuth={setAuth} /> : <AdminApp auth={auth} setAuth={setAuth} />}
                </ToastProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
